<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Image Metadata Viewer: pin the extension and open the viewer from the toolbar."
    />
    <title>Welcome | Image Metadata Viewer</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" sizes="any" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="#top">
        <img
          src="/assets/icon_exif.svg"
          alt=""
          width="145"
          height="105"
          class="brand-logo"
          decoding="async"
        />
        <span class="brand-name">Image Metadata Viewer</span>
      </a>
    </header>

    <main id="top" class="main">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">Thanks for choosing Image Metadata Viewer</h1>
      </section>

      <ol class="steps">
        <li class="step">
          <h2 class="step-title">
            1. Pin the extension for quick access to the viewer.
          </h2>
          <figure class="step-figure step-figure--onboarding">
            <img
              class="step-onboarding-img"
              src="/assets/Browser_Welcome_1.webp"
              width="1600"
              height="900"
              alt="Chrome toolbar with the extensions menu open: pin Image Metadata Viewer."
              loading="lazy"
              decoding="async"
            />
          </figure>
        </li>

        <li class="step">
          <h2 class="step-title">2. Simply click on the extension icon to open the viewer.</h2>
          <figure class="step-figure step-figure--onboarding">
            <img
              class="step-onboarding-img"
              src="/assets/Browser_Welcome_2.webp"
              width="1600"
              height="900"
              alt="Browser toolbar: click the Image Metadata Viewer extension icon to open the viewer."
              loading="lazy"
              decoding="async"
            />
          </figure>
        </li>
      </ol>
    </main>

    <footer class="site-footer">
      <p>View EXIF and image metadata — locally in your browser.</p>
      <p class="site-footer-version" data-welcome-version="__SITE_VERSION__"></p>
    </footer>
  </body>
</html>
