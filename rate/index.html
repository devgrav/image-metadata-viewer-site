<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Image Metadata Viewer — view EXIF and image metadata in Chrome."
    />
    <title>Image Metadata Viewer</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" sizes="any" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="../favicon.png" />
    <link rel="apple-touch-icon" href="../favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="#top">
        <img
          src="../assets/icon_exif.svg"
          alt=""
          width="145"
          height="105"
          class="brand-logo"
          decoding="async"
        />
        <span class="brand-name">Image Metadata Viewer</span>
      </a>
    </header>

    <main id="top" class="main">
      <div class="form-embed-shell">
        <iframe
          class="form-embed-frame"
          title="Rate Image Metadata Viewer — Google Form"
          src="https://docs.google.com/forms/d/e/1FAIpQLSdc4C4Upt4tj7lIpWedN_usV8036-pt2AnewLF7mMWZ0qFDoQ/viewform?embedded=true"
          height="1100"
          >Loading…</iframe>
      </div>
    </main>

    <footer class="site-footer">
      <p>View EXIF and image metadata — locally in your browser.</p>
      <p class="site-footer-version" data-welcome-version="__SITE_VERSION__"></p>
    </footer>
  </body>
</html>
